name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.92.2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_Linux-64bit.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: Display Hugo version
        run: hugo version

      - name: List theme files
        run: |
          echo "Theme files:"
          ls -R themes/PaperMod || echo "PaperMod theme not found in themes directory"

      - name: Display content of a theme file
        run: |
          if [ -f themes/PaperMod/layouts/_default/single.html ]; then
            echo "Content of themes/PaperMod/layouts/_default/single.html:"
            cat themes/PaperMod/layouts/_default/single.html
          else
            echo "themes/PaperMod/layouts/_default/single.html not found"
          fi

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        run: |
          hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/" --verbose

      - name: List generated files
        run: ls -R public

      - name: Debug Output
        run: |
          echo "Content of index.html:"
          cat public/index.html
          echo "Content of a post:"
          cat public/posts/first-post/index.html || echo "First post not found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4