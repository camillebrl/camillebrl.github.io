---
layout: default
title: NLP - ce que je comprends
---

<div class="container my-5">
    <div class="row">
      {% for post in site.posts %}
        <div class="col-md-20">
          <div class="card mb-4">
            <div class="card-body">
              <h5 class="card-title custom-title"><a href="{{ post.url }}">{{ post.title }}</a></h5> <!-- Ajoutez la classe custom-title ici -->
              <p class="card-text">{{ post.excerpt }}</p>
            </div>
            <div class="card-footer">
              <small class="text-muted">Published on {{ post.date | date: "%B %d, %Y" }}</small>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
