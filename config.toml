baseURL = 'https://camillebrl.github.io/'
languageCode = 'en-us'
title = "Camille's Blog"
paginate = 5
theme = 'PaperMod'

enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true
disableFastRender = true

[outputs]
  home = ["HTML", "JSON"]

[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"
  isPlainText = true


[languages.en]
  languageName = "English"
  weight = 1

  [languages.en.taxonomies]
    category = "categories"
    tag = "tags"
    series = "series"
    theme = "themes"
    subtheme = "subthemes"

  [[languages.en.menu.main]]
    name = "Archives"
    url = "/archives/"
    weight = 5

  [[languages.en.menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 5

  [[languages.en.menu.main]]
      name = "Blog Content"
      url = "/blog_content/"
    weight = 5

[taxonomies]
  category = "categories"
  theme = "themes"
  subtheme = "subthemes"

[params]
  env = 'production'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowToc = true
  TocOpen = true
  ShowShareButtons = false
  ShowBreadCrumbs = true
  
  [params.profileMode]
    enabled = false
    title = "PaperMod"
    imageUrl = "#"
    imageTitle = "my image"

    [[params.profileMode.buttons]]
      name = "Archives"
      url = "/archives/"

    [[params.profileMode.buttons]]
      name = "Tags"
      url = "/tags/"

    [[params.profileMode.buttons]]
      name = "Blog Content"
      url = "/blog_content/"
      weight = 10

  [params.homeInfoParams]
    title = "Here is the page where I put my personal researches / paper reviews. Feel free to correct me if you see some mistakes on it!"
  
